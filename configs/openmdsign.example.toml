# openmdsign example configuration (TOML).
#
# Precedence: command-line flags > this file > built-in defaults.
# Copy to ./openmdsign.toml (auto-loaded if present) or pass --config <path>.

# Path to the vendor PKCS#11 shared object (.dylib). REQUIRED for `inspect`.
# This is an EXTERNAL dependency: openmdsign never ships, copies, or hardcodes
# it. Point this at wherever the vendor middleware installed the driver for your
# physical token. Example (comment only — adjust to your install):
#   module = "/Applications/STISC/MoldSign/native_lib/libeToken.dylib"
module = ""

# Optional: pin a specific PKCS#11 slot ID. Omit to enumerate all slots.
# slot = 0

# Optional: select a token by its label.
# token_label = ""

# Optional: select a key/certificate by CKA_ID (hex).
# key_id = ""

# --- The following are carried forward for later signing phases (unused in Phase 0) ---

# Path to a PEM bundle of intermediate/root CA certificates.
# ca_chain = ""

# Override the OCSP responder URL (otherwise read from the cert's AIA extension).
# ocsp_url = ""

# RFC 3161 timestamp authority URL.
# tsa_url = "http://tsp.pki.gov.md/moldsign2/"

# Path to the EU DSS helper jar used by the XAdES profile (non-PDF inputs).
# Build it with `mvn -q package` in java/dss-helper. Precedence:
# --dss-helper > $OPENMDSIGN_DSS_HELPER > this field > java/dss-helper/target/dss-helper.jar
# dss_helper_jar = "/absolute/path/to/dss-helper.jar"

# --- openmdsignd (the browser⇄daemon HTTPS server; see docs/PROTOCOL.md) -------
# Consumed only by `openmdsignd serve`; the CLI ignores this table. Every field
# has a spec-faithful default, so an omitted [daemon] table still works. Flags on
# `serve` override these (precedence: flags > this file > defaults).
[daemon]
# Loopback HTTPS listen address (PROTOCOL.md §1–2). The browser is hardcoded to
# https://localhost.cts.md:18443; that hostname must resolve to 127.0.0.1.
# https_addr = "127.0.0.1:18443"

# Optional plain-HTTP probe listener (PROTOCOL.md §1). Empty disables it.
# http_addr = "127.0.0.1:18480"

# TLS server name the browser targets. Must resolve to loopback.
# hostname = "localhost.cts.md"

# STRICT CORS allowlist (PROTOCOL.md §3). Only these Origins are echoed back in
# Access-Control-Allow-Origin; anything else gets no ACAO. Never reflect-any.
# cors_allowlist = ["https://msign.gov.md", "https://mpass.gov.md"]

# Directory to cache the self-signed DEV certificate for `hostname`. Empty keeps
# it in-memory. NOTE: this is a Phase B stand-in — the real publicly-trusted-cert
# trust gate is Daemon Phase D. A browser will not trust this dev cert.
# dev_cert_dir = ""
